<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Palabra Maestra</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

    <!-- ===================== -->
    <!-- PANTALLA DE INICIO -->
    <!-- ===================== -->

    <section id="homeScreen" class="screen">

        <h1>📚 Palabra Maestra</h1>

        <p class="subtitle">
            El Time's Up de Lengua
        </p>

        <div class="card">

            <label>Mazo</label>

            <select id="deckSelect"></select>

            <label>Número de cartas</label>

            <select id="cardsNumber">
                <option>20</option>
                <option selected>30</option>
                <option>40</option>
                <option>50</option>
            </select>

            <label>Tiempo por turno</label>

            <select id="roundTime">
                <option>30</option>
                <option>45</option>
                <option selected>60</option>
                <option>90</option>
            </select>

            <label>Modo</label>

            <select id="gameMode">
                <option selected>Time's Up</option>
                <option>Entrenamiento</option>
            </select>

            <button id="createGameBtn">
                🎲 Crear partida
            </button>

        </div>

    </section>





    <!-- ===================== -->
    <!-- JUEGO -->
    <!-- ===================== -->

    <section id="playScreen" class="screen hidden">

        <div id="topBar">

            <div id="roundLabel">
                RONDA 1
            </div>

            <div id="timer">
                60
            </div>

        </div>

        <div id="remainingCards">

            Quedan 30 cartas

        </div>

        <div id="gameCard">

            HIPÉRBOLE

        </div>

        <div id="gameButtons">

            <button id="correctBtn">

                ✅ Acierto

            </button>

            <button id="passBtn">

                ⏭ Pasar

            </button>

        </div>

    </section>





    <!-- ===================== -->
    <!-- FIN DEL TURNO -->
    <!-- ===================== -->

    <section id="turnScreen" class="screen hidden">

        <h2>

            ⏰ Turno terminado

        </h2>

        <p>

            Pasa el dispositivo al siguiente jugador.

        </p>

        <button id="copyBtn">

            🔗 Copiar enlace

        </button>

        <button id="nextPlayerBtn">

            ▶ Continuar

        </button>

    </section>





    <!-- ===================== -->
    <!-- FIN DE RONDA -->
    <!-- ===================== -->

    <section id="roundScreen" class="screen hidden">

        <h2>

            🎉 Ronda completada

        </h2>

        <p id="roundDescription">

        </p>

        <button id="nextRoundBtn">

            Empezar siguiente ronda

        </button>

    </section>





    <!-- ===================== -->
    <!-- FIN DEL JUEGO -->
    <!-- ===================== -->

    <section id="finishScreen" class="screen hidden">

        <h2>

            🏆 Partida terminada

        </h2>

        <button id="restartBtn">

            Nueva partida

        </button>

    </section>

</div>

<script src="cards.js"></script>
<script src="script.js"></script>

</body>

</html>
